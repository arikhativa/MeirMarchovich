<div class="contact-container">
    <header class="contact-header">
        <h1>{{ pageTitle }}</h1>
        <p>{{ pageSubtitle }}</p>
    </header>
    <div class="contact-grid">
        <div
            *ngFor="let card of contactCards"
            class="contact-card"
            [class.highlight]="card.highlight"
        >
            <div
                *ngIf="card.icon"
                class="card-icon"
            >
                {{ card.icon }}
            </div>
            <div
                *ngIf="card.image && !card.icon"
                class="card-image"
            >
                <img
                    [ngSrc]="card.image"
                    alt=""
                    width="423.5"
                    height="300"
                />
            </div>
            <h2>{{ card.title }}</h2>
            <p class="subtitle">{{ card.subtitle }}</p>
            <hr />
            <div
                *ngFor="let item of card.details"
                class="info-row"
            >
                <span class="label">{{ item.label }}:</span>
                <a [href]="item.link">{{ item.value }}</a>
            </div>
        </div>
    </div>
    <div class="map-section">
        <div class="map-wrapper">
            <iframe
                [src]="safeMapUrl"
                width="100%"
                height="450"
                style="border: 0"
                allowfullscreen=""
                loading="lazy"
            ></iframe>
        </div>
    </div>
</div>
